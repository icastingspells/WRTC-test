services:
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    ports:
      - "8443:8443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl

  backend:
    build: ./backend
    expose:
      - "3000"

  

  coturn:
    image: coturn/coturn
    container_name: coturn

    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

    command: >
      -n
      --log-file=stdout
      --lt-cred-mech
      --fingerprint
      --realm=2.27.29.74
      --user=asdfpijn:ashdflejrerjhbv
      --min-port=49160
      --max-port=49200